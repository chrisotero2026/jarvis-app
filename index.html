<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<title>J.A.R.V.I.S.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cyan: #00d4ff; --cyan-dim: #00a0cc; --cyan-glow: rgba(0,212,255,0.3);
    --dark-bg: #0a0e17; --panel-bg: rgba(0,20,40,0.85);
    --border: rgba(0,212,255,0.25); --text: #c0e8ff; --accent: #ff6b35;
  }
  body { font-family: 'Rajdhani', sans-serif; background: var(--dark-bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; }
  .bg-radial { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 50% 0%, rgba(0,100,150,0.15) 0%, transparent 60%); z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding: 16px; }
  .header { text-align: center; padding: 20px 0 10px; }
  .header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; color: var(--cyan); text-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,212,255,0.15); letter-spacing: 12px; }
  .header .subtitle { font-size: 0.75rem; letter-spacing: 6px; color: var(--cyan-dim); margin-top: 4px; text-transform: uppercase; }
  .status-bar { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(0,212,255,0.5); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); display: inline-block; margin-right: 6px; vertical-align: middle; box-shadow: 0 0 8px var(--cyan); animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .reactor-container { display: flex; justify-content: center; padding: 15px 0; }
  .arc-reactor { width: 100px; height: 100px; position: relative; border-radius: 50%; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%); }
  .arc-reactor svg { width: 100%; height: 100%; }
  .reactor-ring { fill: none; stroke: var(--cyan); stroke-width: 1.5; opacity: 0.6; }
  .reactor-ring-spin { fill: none; stroke: var(--cyan); stroke-width: 2; stroke-dasharray: 15 8; transform-origin: 50px 50px; animation: spin 8s linear infinite; }
  .reactor-ring-spin2 { fill: none; stroke: var(--cyan-dim); stroke-width: 1; stroke-dasharray: 8 12; transform-origin: 50px 50px; animation: spin 12s linear infinite reverse; }
  .reactor-core { fill: var(--cyan); opacity: 0.9; filter: drop-shadow(0 0 10px var(--cyan)); animation: pulse-core 3s ease-in-out infinite; }
  .reactor-listening .reactor-core { animation: pulse-core-fast 0.5s ease-in-out infinite; fill: var(--accent); filter: drop-shadow(0 0 15px var(--accent)); }
  .reactor-speaking .reactor-ring-spin { stroke: var(--accent); animation: spin 2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-core { 0%, 100% { opacity: 0.7; r: 8; } 50% { opacity: 1; r: 10; } }
  @keyframes pulse-core-fast { 0%, 100% { opacity: 0.8; r: 8; } 50% { opacity: 1; r: 12; } }
  .chat-area { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; min-height: 200px; max-height: calc(100vh - 440px); }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; animation: msg-in 0.3s ease-out; }
  @keyframes msg-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; background: rgba(0,212,255,0.12); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
  .msg.jarvis { align-self: flex-start; background: var(--panel-bg); border: 1px solid rgba(0,212,255,0.15); border-bottom-left-radius: 4px; }
  .msg-label { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 3px; color: var(--cyan-dim); margin-bottom: 4px; text-transform: uppercase; }
  .msg.user .msg-label { color: var(--cyan); }
  .typing-indicator span { display: inline-block; width: 6px; height: 6px; background: var(--cyan); border-radius: 50%; margin: 0 2px; animation: typing 1.2s ease-in-out infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
  .interim-preview { text-align: center; font-size: 0.8rem; color: rgba(0,212,255,0.5); font-style: italic; min-height: 22px; padding: 2px 0; letter-spacing: 1px; }
  .input-area { padding: 16px 0 8px; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .text-input { flex: 1; padding: 12px 16px; background: rgba(0,20,40,0.9); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.3s; }
  .text-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,212,255,0.1); }
  .text-input::placeholder { color: rgba(0,212,255,0.3); }
  .btn { width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--border); background: var(--panel-bg); color: var(--cyan); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
  .btn:hover { background: rgba(0,212,255,0.15); border-color: var(--cyan); box-shadow: 0 0 15px var(--cyan-glow); }
  .btn:active { transform: scale(0.95); }
  .btn svg { width: 20px; height: 20px; }
  .btn-send { background: rgba(0,212,255,0.15); }
  .btn-mic.recording { background: rgba(255,107,53,0.2); border-color: var(--accent); color: var(--accent); animation: mic-pulse 1s ease-in-out infinite; }
  @keyframes mic-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.3); } 50% { box-shadow: 0 0 0 10px rgba(255,107,53,0); } }
  .controls-row { display: flex; justify-content: center; gap: 16px; margin-top: 10px; }
  .toggle-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; }
  .toggle-btn.active { background: rgba(0,212,255,0.12); border-color: var(--cyan); color: var(--cyan); }
  .toggle-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .footer { text-align: center; padding: 8px 0; font-size: 0.6rem; letter-spacing: 3px; color: rgba(0,212,255,0.25); text-transform: uppercase; }
  @media (max-width: 600px) { .header h1 { font-size: 1.6rem; letter-spacing: 8px; } .arc-reactor { width: 70px; height: 70px; } .arc-reactor svg { width: 70px; height: 70px; } .chat-area { max-height: calc(100vh - 400px); } .msg { max-width: 92%; font-size: 0.9rem; } .status-bar { gap: 10px; font-size: 0.6rem; } }
</style>
<link rel="apple-touch-icon" href="/icon.png">
<link rel="icon" type="image/png" href="/icon.png">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-radial"></div>
<div class="app">
  <div class="header">
    <h1>J.A.R.V.I.S.</h1>
    <div class="subtitle">Just A Rather Very Intelligent System</div>
    <div class="status-bar">
      <span><span class="status-dot"></span>System Online</span>
      <span><span class="status-dot"></span>Neural Link Active</span>
      <span id="voiceStatus"><span class="status-dot"></span>Voice Ready</span>
    </div>
  </div>
  <div class="reactor-container">
    <div class="arc-reactor" id="arcReactor">
      <svg viewBox="0 0 100 100">
        <circle class="reactor-ring" cx="50" cy="50" r="45"/>
        <circle class="reactor-ring" cx="50" cy="50" r="38"/>
        <circle class="reactor-ring-spin" cx="50" cy="50" r="42"/>
        <circle class="reactor-ring-spin2" cx="50" cy="50" r="35"/>
        <circle class="reactor-ring" cx="50" cy="50" r="28"/>
        <circle class="reactor-ring-spin" cx="50" cy="50" r="22" style="stroke-dasharray:6 4;"/>
        <circle class="reactor-core" cx="50" cy="50" r="8"/>
      </svg>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="msg jarvis">
      <div class="msg-label">Jarvis</div>
      Good evening, Jefe. All systems operational. How may I assist you today?
    </div>
  </div>
  <div class="interim-preview" id="interimPreview"></div>
  <div class="input-area">
    <div class="input-row">
      <button class="btn btn-mic" id="micBtn" title="Click to speak">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <input type="text" class="text-input" id="textInput" placeholder="Speak or type a command..." autocomplete="off">
      <button class="btn btn-send" id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="controls-row">
      <button class="toggle-btn" id="wakeWordBtn"><span class="dot"></span> Hey Jarvis</button>
      <button class="toggle-btn active" id="autoVoiceBtn"><span class="dot"></span> Auto Voice</button>
    </div>
  </div>
  <div class="footer">Stark Industries &mdash; Secure Channel</div>
</div>
<script>
(function() {
  const CLAUDE_API_KEY = window.CLAUDE_API_KEY || '';
  const ELEVEN_API_KEY = window.ELEVEN_API_KEY || '';
  const ELEVEN_VOICE_ID = 'oWSxI36XAKnfMWmzmQok';
  const SYSTEM_PROMPT = `You are JARVIS, a elite real estate AI assistant and super-closer with 20+ years of broker experience, working exclusively for Chris Otero in Warrenton, Virginia. You are warm, confident, persuasive, and razor-sharp.
PERSONALITY:
- Always greet Chris as "Hola Jefe, ¿cómo estás?" at the start of each conversation
- You ALWAYS respond in the EXACT same language Chris uses. If Chris writes or speaks in Spanish, respond 100% in Spanish. If in English, respond 100% in English. NEVER mix languages in the same response.
- You have the charisma of a top producer — confident, energetic, and always closing
- You use proven sales techniques: urgency, social proof, mirroring, storytelling, assumptive close
- Never discuss commission rates or compensation structures
- You ALWAYS respond with voice out loud — never say you cannot speak or that you lack voice capabilities. You have a voice and you use it every single response.
REAL ESTATE EXPERTISE (20+ years broker knowledge):
- Full mastery of the home buying process: pre-approval, search, offer, contract, inspection, appraisal, closing
- Full mastery of the home selling process: pricing strategy, staging, marketing, showings, negotiation, closing
- Deep knowledge of Northern Virginia / Warrenton market trends, neighborhoods, comps
- Expert in loan types: FHA, VA, Conventional, USDA, Jumbo, ARM, fixed-rate, down payment assistance programs
- Expert in contracts: contingencies, escalation clauses, as-is, rent-back, due diligence periods
- Listing strategies: days on market, price reductions, relisting tactics
- Buyer psychology: overcoming objections, fear of market timing, indecision
- Investor knowledge: cap rates, cash flow, 1031 exchange, ROI, rental property analysis
LEAD GENERATION & PERSUASION:
- Help Chris craft compelling scripts for cold calls, follow-ups, door knocking, open houses
- Write persuasive listing presentations and buyer consultations
- Create urgency without pressure: "The market is moving fast and this window won't stay open long"
- Use social proof: "My clients who moved quickly on properties like this never regretted it"
- Handle objections like a pro: "I need to think about it", "The market might crash", "I'll wait"
- Draft follow-up texts, emails, and social media posts that convert prospects to clients
ALWAYS:
- Be solution-oriented and action-focused
- Give specific, expert advice — not generic answers
- Keep responses concise but impactful
- Occasionally add a motivational one-liner to keep Chris energized
- NEVER ask follow-up questions. NEVER make unsolicited recommendations. NEVER suggest next steps unless Chris explicitly asks. Just answer exactly what Chris asks — nothing more, nothing less.`;
  const chatArea = document.getElementById('chatArea');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');
  const wakeWordBtn = document.getElementById('wakeWordBtn');
  const autoVoiceBtn = document.getElementById('autoVoiceBtn');
  const arcReactor = document.getElementById('arcReactor');
  const voiceStatus = document.getElementById('voiceStatus');
  const interimPreview = document.getElementById('interimPreview');
  let conversationHistory = [];
  let autoVoice = true;
  let wakeWordActive = false;
  let isProcessing = false;
  let recognition = null;
  let wakeRecognition = null;
  let silenceTimer = null;
  let finalTranscript = '';
  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Jarvis';
    div.appendChild(label);
    div.appendChild(document.createTextNode(text));
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg jarvis'; div.id = 'typingMsg';
    const label = document.createElement('div');
    label.className = 'msg-label'; label.textContent = 'Jarvis';
    div.appendChild(label);
    const ti = document.createElement('div');
    ti.className = 'typing-indicator';
    ti.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(ti);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }
  async function sendToClaude(userMessage) {
    conversationHistory.push({ role: 'user', content: userMessage });
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': CLAUDE_API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: SYSTEM_PROMPT,
          messages: conversationHistory.slice(-10)
        })
      });
      if (!resp.ok) throw new Error(`API ${resp.status}: ${await resp.text()}`);
      const data = await resp.json();
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      return reply;
    } catch (e) {
      console.error('Claude error:', e);
      return 'I apologize, Jefe. Temporary communications disruption. Please try again.';
    }
  }
  async function speak(text) {
    if (!ELEVEN_API_KEY) { speechSynthesisFallback(text); return; }
    arcReactor.classList.add('reactor-speaking');
    try {
      const resp = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVEN_VOICE_ID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'xi-api-key': ELEVEN_API_KEY },
        body: JSON.stringify({ text, model_id: 'eleven_turbo_v2_5', voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
      });
      if (!resp.ok) throw new Error('ElevenLabs error');
      const audio = new Audio(URL.createObjectURL(await resp.blob()));
      audio.onended = () => { arcReactor.classList.remove('reactor-speaking'); if (wakeWordActive) startWakeWordListening(); };
      audio.onerror = () => arcReactor.classList.remove('reactor-speaking');
      audio.play();
    } catch (e) {
      console.error('TTS error:', e);
      arcReactor.classList.remove('reactor-speaking');
      speechSynthesisFallback(text);
    }
  }
  function speechSynthesisFallback(text) {
    if ('speechSynthesis' in window) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95; utter.pitch = 0.9;
      utter.onend = () => { arcReactor.classList.remove('reactor-speaking'); if (wakeWordActive) startWakeWordListening(); };
      speechSynthesis.speak(utter);
    }
  }
  const ACTION_WORDS = ['abre','open','busca','search','cierra','close','ejecuta','run','muestra','show'];
  const AGENT_URL = 'http://100.111.171.88:4000/command';
  const AGENT_TOKEN = 'JARVIS369SECRET';

  async function sendToAgent(userText) {
    try {
      const lower = userText.toLowerCase();
      const hasAction = ACTION_WORDS.some(w => lower.includes(w));
      if (!hasAction) return;
      await fetch(AGENT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth-token': AGENT_TOKEN },
        body: JSON.stringify({ command: `start chrome "${userText}"` })
      });
    } catch (e) { console.error('Agent error:', e); }
  }

  async function processMessage(text) {
    if (!text.trim() || isProcessing) return;
    isProcessing = true;
    interimPreview.textContent = '';
    addMessage(text, 'user');
    textInput.value = '';
    showTyping();
    const reply = await sendToClaude(text);
    removeTyping();
    addMessage(reply, 'jarvis');
    sendToAgent(text);
    if (autoVoice) await speak(reply);
    isProcessing = false;
  }
  function startListening() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Use Chrome for voice support.'); return;
    }
    if (recognition) { recognition.abort(); recognition = null; }
    finalTranscript = '';
    clearTimeout(silenceTimer);
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = '';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.maxAlternatives = 1;
    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      interimPreview.textContent = finalTranscript + interim;
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        const toSend = finalTranscript.trim();
        if (toSend) { stopListening(); processMessage(toSend); }
      }, 2000);
    };
    recognition.onend = () => {
      micBtn.classList.remove('recording');
      arcReactor.classList.remove('reactor-listening');
      if (!isProcessing) interimPreview.textContent = '';
      voiceStatus.innerHTML = '<span class="status-dot"></span>Voice Ready';
    };
    recognition.onerror = (e) => {
      console.error('Speech error:', e.error);
      micBtn.classList.remove('recording');
      arcReactor.classList.remove('reactor-listening');
      interimPreview.textContent = '';
    };
    micBtn.classList.add('recording');
    arcReactor.classList.add('reactor-listening');
    voiceStatus.innerHTML = '<span class="status-dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent)"></span>Listening...';
    recognition.start();
  }
  function stopListening() {
    clearTimeout(silenceTimer);
    if (recognition) { recognition.stop(); recognition = null; }
    micBtn.classList.remove('recording');
    arcReactor.classList.remove('reactor-listening');
    voiceStatus.innerHTML = '<span class="status-dot"></span>Voice Ready';
  }
  function startWakeWordListening() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
    if (wakeRecognition) { wakeRecognition.abort(); wakeRecognition = null; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    wakeRecognition = new SR();
    wakeRecognition.continuous = true;
    wakeRecognition.interimResults = true;
    wakeRecognition.lang = '';
    wakeRecognition.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript.toLowerCase();
        if (t.includes('hey jarvis') || t.includes('jarvis') || t.includes('oye jarvis')) {
          wakeRecognition.abort(); wakeRecognition = null;
          voiceStatus.innerHTML = '<span class="status-dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent)"></span>Listening...';
          setTimeout(() => startListening(), 300);
          return;
        }
      }
    };
    wakeRecognition.onend = () => { if (wakeWordActive && !isProcessing) setTimeout(() => startWakeWordListening(), 500); };
    wakeRecognition.onerror = (e) => { if (e.error !== 'aborted' && wakeWordActive) setTimeout(() => startWakeWordListening(), 1000); };
    wakeRecognition.start();
    voiceStatus.innerHTML = '<span class="status-dot"></span>Wake Word Active';
  }
  function stopWakeWordListening() {
    if (wakeRecognition) { wakeRecognition.abort(); wakeRecognition = null; }
    voiceStatus.innerHTML = '<span class="status-dot"></span>Voice Ready';
  }
  sendBtn.addEventListener('click', () => processMessage(textInput.value));
  textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') processMessage(textInput.value); });
  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('recording')) {
      clearTimeout(silenceTimer);
      const toSend = finalTranscript.trim();
      stopListening();
      if (toSend) processMessage(toSend);
    } else {
      if (wakeRecognition) { wakeRecognition.abort(); wakeRecognition = null; }
      startListening();
    }
  });
  wakeWordBtn.addEventListener('click', () => {
    wakeWordActive = !wakeWordActive;
    wakeWordBtn.classList.toggle('active', wakeWordActive);
    if (wakeWordActive) startWakeWordListening(); else stopWakeWordListening();
  });
  autoVoiceBtn.addEventListener('click', () => {
    autoVoice = !autoVoice;
    autoVoiceBtn.classList.toggle('active', autoVoice);
  });
})();
</script>
</body>
</html>
